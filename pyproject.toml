    "contextlib2>=0.6.0,<0.7",
    "coverage>=6.0.0,<7",
    "coveralls>=3.0.0,<4",
    "flake8>=7.0.0,<8",
    "html5validator>=0.3.0,<0.4",
    "isort>=5,<6",
    "mock>=4.0.0,<5",
    "mypy>=1,<2",
    "polling2>=0.5.0,<0.6",
    "pytest>=8.0.0,<9",
    "pyvirtualdisplay>=3.0.0,<4",
    "pywin32>= 301 ; sys_platform == 'win32'",
    "selenium>=3.0.0,<4",
    "json2xml>=3.21.0,<4",
    "pytest-asyncio>=0.24.0,<0.25",
    "openai>=1.59.3,<2",
    "javalang>=0.13.0,<0.14",
    "pre-commit>=4.5.1,<5",
    "ruff>=0.15.2,<0.16",

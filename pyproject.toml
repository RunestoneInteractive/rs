    "stripe>=2.0.0,<3",
    "toml>=0.10.2,<0.11",
    "tqdm>=4.65.0,<5",
    "uvicorn>=0.27.0,<0.28",
    "WTForms>=3.0.0,<4",
    "itsdangerous>=2.2.0,<3",
    "standard-asyncore>=3.13.0,<4",
    "standard-imghdr>=3.13.0,<4",

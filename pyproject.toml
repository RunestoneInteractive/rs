    "pretext>=2.42",
    "psycopg2-binary>=2.9.3,<3",
    "pycryptodome>=3.18.0,<4",
    "pydal>=20230521.1",
    "pydantic>=2.0.0,<3",
    "pydantic-settings>=2.0.3,<3",
    "pyhumps>=3.8.0,<4",
    "pyjwt>=2.0.0,<3",

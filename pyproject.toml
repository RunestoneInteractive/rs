    "altair>=4.2.0,<5",
    "asyncclick>=8.1.3.4,<9",
    "asyncpg>=0.30.0,<0.31",
    "beautifulsoup4>=4.0.0,<5",
    "bleach>=6.0.0,<7",
    "boto3>=1.26.88,<2",
    "botocore>=1.29.87,<2",
    "celery>=5.2.7,<6",
    "cryptography>=46.0.0,<47",
    "cssselect>= 1.0",
    "dash[celery, diskcache]>=2.7.0,<3",

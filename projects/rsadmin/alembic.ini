# Alembic configuration bundled into the rsadmin wheel.
#
# The `rsmigrate` console script (rsptx.build_tools.run_migrations) loads this
# file for its logging configuration and then overrides `script_location` with
# the absolute path to the bundled migrations/ directory, so migrations can be
# run from any working directory. The database URL is chosen at runtime by
# migrations/env.py from the DBURL / DEV_DBURL environment variables.

[alembic]
# Default location of the migration scripts. `rsmigrate` overrides this with an
# absolute path at runtime; %(here)s keeps raw `alembic -c <this file>` working
# too (it resolves to the directory containing this ini file).
script_location = %(here)s/migrations

prepend_sys_path = .

version_path_separator = os

# Placeholder; the real URL is set by migrations/env.py from the environment.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

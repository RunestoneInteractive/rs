version: 2

build:
    os: "ubuntu-24.04"
    tools:
        python: "3.13"
    jobs:
        post_create_environment:
            # Install uv via the standalone installer
            # https://docs.astral.sh/uv/getting-started/installation/#standalone-installer
            - curl -LsSf https://astral.sh/uv/install.sh | sh
        post_install:
            # Each job line runs in its own shell, so the installer's PATH change
            # doesn't persist — invoke uv by its absolute install path. Install all
            # dependency groups (including 'docs') into the Read the Docs virtualenv.
            - VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH $HOME/.local/bin/uv sync --all-groups --active
            # RUNESTONE_PATH is defined in the readthedocs control panel

sphinx:
    configuration: docs/source/conf.py
